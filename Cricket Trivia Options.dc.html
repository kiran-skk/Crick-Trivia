<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="design_doc_mode" content="canvas">
<style>
  body { margin: 0; background: #f0eee9; font-family: system-ui, sans-serif; }
  .dv-turn { padding: 40px 44px 32px; }
  .dv-thd { display:flex; align-items:baseline; gap:10px; margin:0 0 20px; }
  .dv-tid { font:600 10px ui-monospace,Menlo,monospace; padding:3px 7px; background:#143C2A; color:#fff; border-radius:4px; text-decoration:none; }
  .dv-tname { font:600 14px/1.2 system-ui,sans-serif; color:#1a1a1a; }
  .dv-opts { display:flex; flex-wrap:wrap; gap:32px; align-items:flex-start; }
  .dv-opt { flex:none; display:flex; flex-direction:column; gap:9px; scroll-margin-top:16px; }
  .dv-oid { font:600 10.5px ui-monospace,Menlo,monospace; padding:3px 7px; background:rgba(0,0,0,.08); color:#1a1a1a; border-radius:5px; text-decoration:none; }
  .dv-olabel { display:flex; align-items:baseline; gap:8px; font:400 12px/1.3 system-ui,sans-serif; color:rgba(0,0,0,.55); }
  .dv-card { background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.06); overflow:hidden; }
  .dv-opt:target .dv-oid { background:#2a78d6; color:#fff; }
  .dv-next { margin:22px 0 0; font:12px/1.5 system-ui,sans-serif; color:rgba(0,0,0,.5); }
</style>
</helmet>

<section class="dv-turn" id="t1">
  <div class="dv-thd"><a class="dv-tid" href="#t1">1</a><span class="dv-tname">Stumped — Guess the Cricketer: two directions</span></div>
  <div class="dv-opts">
    <div class="dv-opt" id="1a">
      <div class="dv-olabel"><a class="dv-oid" href="#1a">1a</a>Scorecard — cream, serif headlines, ledger-style hints</div>
      <div class="dv-card" style="width:1180px">
        <dc-import name="Cricket Trivia A" hint-size="1180px,900px" style="width:1180px;height:900px;overflow:auto;display:block;"></dc-import>
      </div>
    </div>
    <div class="dv-opt" id="1b">
      <div class="dv-olabel"><a class="dv-oid" href="#1b">1b</a>Pitch Report — dark stadium blocks, mono scoreboard numerals</div>
      <div class="dv-card" style="width:1180px">
        <dc-import name="Cricket Trivia B" hint-size="1180px,900px" style="width:1180px;height:900px;overflow:auto;display:block;"></dc-import>
      </div>
    </div>
  </div>
  <p class="dv-next">Try next: "more like <a class="dv-oid" href="#1a">1a</a> but darker" · "combine the mono numbers from <a class="dv-oid" href="#1b">1b</a> with <a class="dv-oid" href="#1a">1a</a>'s serif" · "add a timer to the play screen"</p>
</section>

</x-dc>
</body>
</html>
